services:
  backend:
    build: 
      context: ./standalone-backend
      dockerfile: Dockerfile
    ports:
      - "8080:3000"
    volumes:
      - ./temp:/tmp
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # If you want to serve the frontend via Docker as well:
  # frontend:
  #   build: .
  #   ports:
  #     - "8080:80"
  #   restart: always
