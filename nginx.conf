server {
    listen 80;
    listen [::]:80;
    server_name api.mumantij-ai.com 187.127.114.102;

    location /api/health-check {
        return 200 'Nginx is REACHABLE';
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.mumantij-ai.com 187.127.114.102;

    ssl_certificate /etc/letsencrypt/live/api.mumantij-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mumantij-ai.com/privkey.pem;

    client_max_body_size 500M;

    location /api/health-check {
        return 200 'Nginx HTTPS is REACHABLE';
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve the generated videos directly via Nginx
    location /temp {
        alias /root/vps-hosting/temp/; 
        autoindex on;
        add_header Access-Control-Allow-Origin *;
    }
}